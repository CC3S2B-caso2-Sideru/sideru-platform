services:
  #  BASES DE DATOS

  # PostgreSQL IAM DB
  postgres-iam:
    image: postgres:16-alpine
    container_name: postgres-iam
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: iam_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db/iam/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/iam/02-data.sql:/docker-entrypoint-initdb.d/02-data.sql
      - pgdata-iam:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d iam_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL Catálogo DB
  postgres-catalogo:
    image: postgres:16-alpine
    container_name: postgres-catalogo
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: catalogo_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db/catalogo/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/catalogo/02-data.sql:/docker-entrypoint-initdb.d/02-data.sql
      - pgdata-catalogo:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d catalogo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL Backend DB
  postgres-backend:
    image: postgres:16-alpine
    container_name: postgres-backend
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: backend_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db/backend/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/backend/02-data.sql:/docker-entrypoint-initdb.d/02-data.sql
      - pgdata-backend:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d backend_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  #  INFRAESTRUCTURA

  # Config Server
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      postgres-iam:
        condition: service_healthy
      postgres-catalogo:
        condition: service_healthy
      postgres-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Eureka Server
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  #  SERVICIOS DE NEGOCIO

  # IAM Service
  iam-service:
    build: ./iam
    container_name: iam-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-iam:5432/iam_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_KEY=${JWT_KEY}
    depends_on:
      postgres-iam:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # Catálogo Service
  catalogo-service:
    build: ./catalogo
    container_name: catalogo-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-catalogo:5432/catalogo_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      postgres-catalogo:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # Backend Service (monolito)
  backend-service:
    build: ./backend
    container_name: backend-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-backend:5432/backend_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      postgres-backend:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # API Gateway
  gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - JWT_KEY=${JWT_KEY}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      iam-service:
        condition: service_started
      catalogo-service:
        condition: service_started
      backend-service:
        condition: service_started

volumes:
  pgdata-iam:
  pgdata-catalogo:
  pgdata-backend:
