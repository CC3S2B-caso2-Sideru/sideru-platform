apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata-iam-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-iam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-iam
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres-iam
    spec:
      containers:
        - name: postgres-iam
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: iam_db
            - name: POSTGRES_USER
              value: admin
            - name: POSTGRES_PASSWORD
              value: admin
          ports:
            - containerPort: 5432
          livenessProbe:
            exec:
              command:
                - pg_isready
                - "-U"
                - admin
                - "-d"
                - iam_db
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - mountPath: /docker-entrypoint-initdb.d/01-schema.sql
              name: postgres-iam-vol
              subPath: 01-schema.sql
            - mountPath: /docker-entrypoint-initdb.d/02-data.sql
              name: postgres-iam-vol
              subPath: 02-data.sql
            - mountPath: /var/lib/postgresql/data
              name: pgdata-iam-storage
      volumes:
        - name: postgres-iam-vol
          configMap:
            name: postgres-iam-cm
        - name: pgdata-iam-storage
          persistentVolumeClaim:
            claimName: pgdata-iam-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-iam
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres-iam
