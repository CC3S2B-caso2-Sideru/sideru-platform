---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata-pedidos-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-pedidos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-pedidos
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres-pedidos
    spec:
      containers:
        - name: postgres-pedidos
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: pedidos_db
            - name: POSTGRES_USER
              value: admin
            - name: POSTGRES_PASSWORD
              value: admin
          ports:
            - containerPort: 5432
          livenessProbe:
            exec:
              command:
                - pg_isready
                - "-U"
                - admin
                - "-d"
                - pedidos_db
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - mountPath: /docker-entrypoint-initdb.d/01-schema.sql
              name: postgres-pedidos-vol
              subPath: 01-schema.sql
            - mountPath: /docker-entrypoint-initdb.d/02-data.sql
              name: postgres-pedidos-vol
              subPath: 02-data.sql
            - mountPath: /var/lib/postgresql/data
              name: pgdata-pedidos-storage
      volumes:
        - name: postgres-pedidos-vol
          configMap:
            name: postgres-pedidos-cm
        - name: pgdata-pedidos-storage
          persistentVolumeClaim:
            claimName: pgdata-pedidos-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-pedidos
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres-pedidos
