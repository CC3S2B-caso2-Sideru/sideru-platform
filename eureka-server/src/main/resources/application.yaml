spring:
  application:
    name: eureka-server
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888}

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8761
